# Dependencies
markdown:            kramdown
highlighter:         rouge

kramdown:
  input: GFM
  auto_ids: true
  syntax_highlighter: rouge

# Gems (for Jekyll 3.0)
gems: [jekyll-paginate]
# plugins: [jekyll-paginate]

plugins:
  - jekyll-toc
  - jekyll-paginate
toc:
  min_level: 1
  max_level: 3
  ordered_list: false
  no_toc_section_class: no_toc_section
  list_id: toc
  list_class: section-nav
  sublist_class: ''
  item_class: toc-entry
  item_prefix: toc-

# Permalinks
#
# Use of `relative_permalinks` ensures post links from the index work properly.
permalink:           /posts/:title:output_ext

# Setup
title:               agrim
tagline:             (Everything is a file)
description:         Everything is a file.
url:                 https://agrim123.github.io
baseurl:             ''
paginate:            7

# About/contact
author:
  name:              Agrim
  url:               https://agrim123.github.io
  email:             agrimmittal@protonmail.com

# Custom vars
version:             2.0

# Social Media
github:       http://github.com/agrim123

# Theme Author (Please don't edit this line cause of MIT LICENSE rules)
theme:
  creator:      Rizky Ariestiyansyah
  codename:     Naringu
  link:         https://github.com/ariestiyansyah/naringu
